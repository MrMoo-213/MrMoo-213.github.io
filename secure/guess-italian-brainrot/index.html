<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Italian Brainrot Character!</title>

<style>
html, body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f4f4f9;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 600px;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

/* ✅ LANDSCAPE CANVAS */
#character-image {
    width: 500px;
    height: 300px;
    object-fit: cover;
    border: 2px solid #ccc;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

select {
    padding: 10px;
    font-size: 1rem;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    margin-top: 15px;
    cursor: pointer;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="game-container">
    <h1>Guess the Italian Brainrot Character!</h1>

    <img id="character-image">

    <div id="streak-counter">Streak: 0</div>

    <select id="character-select"></select>

    <button id="select-button">Select</button>
    <button id="skip-button" style="display:none;">Skip Video</button>
</div>

<script>
const files = {
    "bombardino-crocodilo": ["Bombardino_Crocodilo.webp"],
    "bombombini-gusini": ["Bombombini_Gusini.webp"],
    "br-br-patapim": ["Br_Br_Patapim.webp"],
    "lirili-larila": ["Lirili_Larila.webp"],
    "tralalero-tralala": ["Tralalero_Tralala.webp"],
    "trulimero-trulichina": ["Trulimero_Trulichina.webp"],
    "tung-tung-tung-sahur": ["Tung_Tung_Tung_Sahur.webp"],
    "boneca-ambalabu": ["Boneca_Ambalabu.webp"],
    "cappuccino-assassino": ["Cappuccino_Assassino.webp"]
};

const img = document.getElementById("character-image");
const select = document.getElementById("character-select");
const button = document.getElementById("select-button");
const streakText = document.getElementById("streak-counter");

let correct = "";
let streak = 0;

function loadOptions() {
    Object.keys(files).forEach(k => {
        let opt = document.createElement("option");
        opt.value = k;
        opt.textContent = k.replace(/-/g, " ");
        select.appendChild(opt);
    });
}

function randomImage() {
    const keys = Object.keys(files);
    const key = keys[Math.floor(Math.random() * keys.length)];
    const file = files[key][0];

    correct = key;

    img.src = "assets/" + file;

    img.onload = () => {
        randomCrop();
    };
}

function randomCrop() {
    img.style.objectFit = "cover";
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    img.style.objectPosition = `${x}% ${y}%`;
}

button.onclick = () => {
    if (select.value === correct) {
        streak++;
        alert("Correct!");
    } else {
        streak = 0;
        alert("Wrong!");
    }

    streakText.innerText = "Streak: " + streak;
    randomImage();
};

loadOptions();
randomImage();
</script>

</body>
</html>
