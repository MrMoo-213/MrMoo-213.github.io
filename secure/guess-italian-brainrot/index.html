<script src="/secure/auth.js"></script>
<script>
const files = {
    "bombardino-crocodilo": ["Bombardino_Crocodilo.webp", "videos/Bombardino_Crocodilo.webm"],
    "bombombini-gusini": ["Bombombini_Gusini.webp", "videos/Bombombini_Gusini.webm"],
    "br-br-patapim": ["Br_Br_Patapim.webp", "videos/Br_Br_Patapim.webm"],
    "lirili-larila": ["Lirili_Larila.webp", "videos/Lirili_Larila.webm"],
    "tralalero-tralala": ["Tralalero_Tralala.webp", "videos/Tralalero_Tralala.webm"],
    "trulimero-trulichina": ["Trulimero_Trulichina.webp", "videos/Trulimero_Trulichina.webm"],
    "tung-tung-tung-sahur": ["Tung_Tung_Tung_Sahur.webp", "videos/Tung_Tung_Tung_Sahur.webm"],
    "boneca-ambalabu": ["Boneca_Ambalabu.webp", "videos/Boneca_Ambalabu.webm"],
    "cappuccino-assassino": ["Cappuccino_Assassino.webp", "videos/Cappuccino_Assassino.webm"]
};

const characterImage = document.getElementById('character-image');
const characterSelect = document.getElementById('character-select');
const selectButton = document.getElementById('select-button');
const streakCounter = document.getElementById('streak-counter');

let correctAnswer = "";
let streak = parseInt(getCookie('streak')) || 0;

const setCookie = (name, value, days) => {
    const encodedValue = btoa(value);
    const date = new Date();
    date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
    document.cookie = `${name}=${encodedValue};expires=${date.toUTCString()};path=/`;
};

const getCookie = (name) => {
    const cookies = document.cookie.split(';');
    for (let c of cookies) {
        c = c.trim();
        if (c.startsWith(name + "=")) {
            return atob(c.split("=")[1]);
        }
    }
    return null;
};

const populateSelectOptions = () => {
    characterSelect.innerHTML = "";
    Object.keys(files).forEach(key => {
        const option = document.createElement('option');
        option.value = key;
        option.textContent = key.replace(/-/g, ' ');
        characterSelect.appendChild(option);
    });
};

const randomCrop = () => {
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    characterImage.style.objectFit = "cover";
    characterImage.style.objectPosition = `${x}% ${y}%`;
};

const loadRandomCharacterImage = () => {
    const keys = Object.keys(files);
    const randomKey = keys[Math.floor(Math.random() * keys.length)];

    const imageFile = files[randomKey][0];

    correctAnswer = randomKey;

    characterImage.classList.add('hidden');
    characterImage.src = `assets/${imageFile}`;

    characterImage.onload = () => {
        characterImage.classList.remove('hidden');
        randomCrop();
    };
};

const playVideo = (videoSrc) => {
    const videoElement = document.createElement('video');
    videoElement.src = `assets/${videoSrc}`;
    videoElement.autoplay = true;
    videoElement.playsInline = true;

    const skipButton = document.getElementById('skip-button');
    skipButton.style.display = 'block';

    characterSelect.disabled = true;
    selectButton.disabled = true;

    videoElement.addEventListener('ended', () => {
        location.reload();
    });

    skipButton.onclick = () => {
        videoElement.pause();
        location.reload();
    };

    characterImage.replaceWith(videoElement);
};

const updateStreakCounter = () => {
    streakCounter.textContent = `Streak: ${streak}`;
};

const checkAnswer = () => {
    const selectedValue = characterSelect.value;

    const videoFile = files[correctAnswer][1];
    playVideo(videoFile);

    if (selectedValue === correctAnswer) {
        streak++;
        alert("Correct!");
    } else {
        streak = 0;
        alert("Wrong!");
    }

    setCookie('streak', streak, 7);
    updateStreakCounter();
};

selectButton.addEventListener('click', checkAnswer);

populateSelectOptions();
loadRandomCharacterImage();
updateStreakCounter();
</script>
