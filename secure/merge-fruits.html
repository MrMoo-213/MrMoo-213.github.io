<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Merge Fruits</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a18;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    font-family: 'Trebuchet MS', 'Arial Rounded MT Bold', sans-serif;
  }
  #header, #footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 400px;
    flex-wrap: nowrap;
	gap: 10px;
  }
  .score-box {
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.04));
    border: 4px solid rgba(255, 255, 255, 0.12);
	border-radius: 14px;
    padding: 6px 18px;
    text-align: center;
    min-width: 140px;
	display: flex;
    flex-direction: row;
    align-items: center;
	justify-content: space-between;
  }
  .score-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 2px;
	text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
  }
  .score-value {
    font-size: 24px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
  }
  #nextBox {
    display: flex;
    flex-direction: column;
    align-items: center;
	justify-content: space-between;
	height: 50px;
  }
  #next-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
	text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
	white-space: nowrap;
	position: relative;
	top: -13px;
  }
  #nextCanvas {
    display: block;
	background: transparent;
  }
  #gameCanvas {
    display: block;
    cursor: none;
	border: 4px solid rgba(255, 255, 255, 0.12);
	border-radius: 14px;
  }
  #legend {
    display: flex;
    gap: 5px;
    align-items: center;
    justify-content: center;
    width: 400px;
    padding: 4px 0;
    flex-wrap: wrap;
	border: 4px solid rgba(255, 255, 255, 0.12);
	border-radius: 14px;
	flex: 1;/* occupa quasi tutto */
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
	padding: 0 8px;
    font-size: 10px;
    color: rgba(255,255,255,0.45);
	text-transform: uppercase;
	text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
  }
  .legend-dot {
    width: 14px;
    height: 12px;
    border-radius: 50%;
  }
  
  #controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
	border: 4px solid rgba(255, 255, 255, 0.12);
	border-radius: 14px;
	height: auto;/* importante */
    align-self: stretch;/* ← forza stessa altezza della legend */
  }
  button {
	background: none;
	border: 0;
	font-size: 22px;
	text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>

  <div id="header">
    <div class="score-box">
      <div class="score-label">POINTS</div>
      <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <div id="nextBox">
      <canvas id="nextCanvas" width="50" height="50" style="width:50px;height:50px"></canvas>
	  <div id="next-label">NEXT</div>
    </div>
    <div class="score-box">
      <div class="score-label">BEST</div>
      <div class="score-value" id="bestDisplay">0</div>
    </div>
  </div>
  
  <canvas id="gameCanvas" width="400" height="580"></canvas>
  
  <div id="footer">
    <div id="legend"></div>
	<div id="controls">
		<button onclick="changeMute()">🎵</button>
		<button onclick="pickSkyColor()">🌈</button>
		<button onclick="doEarthquake()">🌋</button>
		<button onclick="doBomb()">💣</button>
		<button onclick="doRandomize()">♻️</button>
	</div>
  </div>
  
  <audio id="bgMusic" loop preload="auto"><source src="./merge-fruits-music.mp3" type="audio/mpeg"></audio>
  <audio id="bgSound" preload="auto"><source src="./merge-fruits-sound.mp3" type="audio/mpeg"></audio>
  <audio id="bgDrop" preload="auto"><source src="./merge-fruits-drop.mp3" type="audio/mpeg"></audio>
  
<script>
const {
	Engine,
	Bodies,
	Body,
	World,
	Events
} = Matter;

// ─── Config 
const W = 400;
const H = 580;
const WALL_T = 50;
const DROP_Y = 38;
const DANGER_Y = 100;
const DROP_COOLDOWN = 550;

const TIERS = [
	{ r: 15,	color: '#dd4444',	name: 'Cherry',		pts: 1,		weight: 40,	drawFn: drawCherry		},
	{ r: 20,	color: '#ee4444',	name: 'Strawberry',	pts: 3,		weight: 30,	drawFn: drawStrawberry	},
	{ r: 30,	color: '#884499',	name: 'Plum',		pts: 5,		weight: 20,	drawFn: drawPlum		},
	{ r: 35,	color: '#ffdd44',	name: 'Lemon',		pts: 8,		weight: 6,	drawFn: drawLemon		},
	{ r: 40,	color: '#774400',	name: 'Kiwi',		pts: 12,	weight: 1,	drawFn: drawKiwi		},
	{ r: 45,	color: '#ffbb80',	name: 'Peach',		pts: 18,	weight: 1,	drawFn: drawPeach		},
	{ r: 55,	color: '#ff8822',	name: 'Orange',		pts: 25,	weight: 1,	drawFn: drawOrange		},
	{ r: 65,	color: '#bb4433',	name: 'Apple',		pts: 35,	weight: 1,	drawFn: drawApple		},
	{ r: 70,	color: '#664433',	name: 'Coconut',	pts: 45,	weight: 0,	drawFn: drawCoconut		},
	{ r: 80,	color: '#99bb33',	name: 'Pear',		pts: 55,	weight: 0,	drawFn: drawPear		},
	{ r: 90,	color: '#ee9922',	name: 'Pineapple',	pts: 75,	weight: 0,	drawFn: drawPineapple	},
	{ r: 100,	color: '#bb9944',	name: 'Melon',		pts: 95,	weight: 0,	drawFn: drawMelon		},
	{ r: 110,	color: '#226611',	name: 'Watermelon',	pts: 120,	weight: 0,	drawFn: drawWatermelon	},
];

//music
let audioMode = 1;
let musicStarted = false;

function changeMute() {
	audioMode = (audioMode + 1) % 2;
	stopMusic();
	if (audioMode !== 0) startMusic();
}

function stopMusic() {
	const music = document.getElementById("bgMusic");
	if (music) music.pause();
	musicStarted = false;
}

function startMusic(fromBeginning = true) {
	if (audioMode === 0) return;
	stopMusic();
	const music = document.getElementById("bgMusic");
	if (music) {
		music.volume = 0.5;
		if (fromBeginning) music.currentTime = 0;
		music.play();
		musicStarted = true;
	}
}

function playSound(id) {
	if (audioMode === 0) return;
	const audio = document.getElementById(id);
	if (!audio) return; //id non valido
	audio.currentTime = 0;
	audio.play();
}


// ─── Physics 
const engine = Engine.create({
	gravity: {
		y: 2
	},
	positionIterations: 10,
	velocityIterations: 8
});
const world = engine.world;

World.add(world, [
	Bodies.rectangle(
		W / 2, H + WALL_T / 2 - 2,
		W + WALL_T * 2, WALL_T, {
			isStatic: true,
			label: 'wall',
			friction: 0.6,
			restitution: 0.1
		}),
	Bodies.rectangle(
		-WALL_T / 2 + 2, H / 2,
		WALL_T, H * 3, {
			isStatic: true,
			label: 'wall',
			friction: 0.4
		}),
	Bodies.rectangle(
		W + WALL_T / 2 - 2, H / 2,
		WALL_T, H * 3, {
			isStatic: true,
			label: 'wall',
			friction: 0.4
		}),
]);

// ─── State 
let balls = [];
let mergeQueue = [];
let mergeEffects = [];
let popParticles = [];

//punteggio
let score = 0;
let best = parseInt(localStorage.getItem('mf_best') || '0');

let gameOver = false;
let canDrop = true;
let cooldownTimer = 0;
let cursorX = W / 2;
let dangerTimer = 0;
let curTier = rndTier();
let nxtTier = rndTier();
let shakeX = 0;
let shakeY = 0;
let shakePow = 0; //shake visivo (no fisica)
let dropAngle = Math.random() * 2 - 1; //lancio frutta appena angolata (casuale)


//bombetta
let bombs = [];
function rndIsBomb() { return Math.random() < 0.05; }
let curIsBomb = false;
let nxtIsBomb = rndIsBomb();

// ─── DOM
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const ncanv = document.getElementById('nextCanvas');
const nctx = ncanv.getContext('2d');
const scoreEl = document.getElementById('scoreDisplay');
const bestEl = document.getElementById('bestDisplay');
bestEl.textContent = best;


//fix render sgranato
const DPR = window.devicePixelRatio || 1;

// Scala gameCanvas
canvas.width = W * DPR;
canvas.height = H * DPR;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(DPR, DPR);

// Scala nextCanvas
ncanv.width = 50 * DPR;
ncanv.height = 50 * DPR;
nctx.scale(DPR, DPR);


// Legenda
const legendEl = document.getElementById('legend');
TIERS.forEach(t => {
	const d = document.createElement('div');
	d.className = 'legend-item';
	d.innerHTML = `<div class="legend-dot" style="background:${t.color}"></div><span>${t.name}</span>`;
	legendEl.appendChild(d);
});

// ─── Helpers
function rndTier() {
	const total = TIERS.reduce((sum, t) => sum + (t.weight || 0), 0);
	let r = Math.random() * total;
	for (let i = 0; i < TIERS.length; i++) {
		r -= TIERS[i].weight || 0;
		if (r <= 0) return i;
	}
	return 0;
}

function hexRgb(h) {
	return {
		r: parseInt(h.slice(1, 3), 16),
		g: parseInt(h.slice(3, 5), 16),
		b: parseInt(h.slice(5, 7), 16)
	};
}

function clampX(tier) {
	const r = TIERS[tier].r;
	return Math.max(r + 2, Math.min(W - r - 2, cursorX));
}

// ─── Ball Creation
function spawnBall(x, y, tier) {
	const t = TIERS[tier];
	const b = Bodies.circle(x, y, t.r, {
		restitution: 0.22,
		friction: 0.55,
		frictionAir: 0.007,
		density: 0.0025,
		label: 'ball',
		collisionFilter: {
			category: 0x0001,
			mask: 0x0001
		},
		angle: dropAngle,
		gameTier: tier,
		merging: false,
	});
	World.add(world, b);
	balls.push(b);
	return b;
}

// ─── Collision
Events.on(engine, 'collisionStart', ev => {
	if (gameOver) return;
	ev.pairs.forEach(({
		bodyA: a,
		bodyB: b
	}) => {
		//gestione bombette
		if (a.isBomb) explodeBomb(a);
		if (b.isBomb) explodeBomb(b);

		if (a.label !== 'ball' || b.label !== 'ball') return;
		if (a.gameTier !== b.gameTier || a.gameTier >= TIERS.length) return;
		if (a.merging || b.merging) return;
		a.merging = b.merging = true;
		mergeQueue.push([a, b]);
	});
});

function processMerges() {
	if (!mergeQueue.length) return;
	mergeQueue.splice(0).forEach(([a, b]) => {
		const mx = (a.position.x + b.position.x) / 2;
		const my = (a.position.y + b.position.y) / 2;
		const tier = (a.gameTier + 1) % TIERS.length;
		World.remove(world, a);
		World.remove(world, b);
		balls = balls.filter(x => x !== a && x !== b);

		score += TIERS[tier].pts;
		scoreEl.textContent = score;
		if (score > best) {
			best = score;
			bestEl.textContent = best;
			localStorage.setItem('mf_best', best);
		}

		const nb = spawnBall(mx, my, tier);
		Body.setVelocity(nb, {
			x: (Math.random() - 0.5) * 2,
			y: -5
		});

		// Ring effect
		mergeEffects.push({
			x: mx,
			y: my,
			r: TIERS[tier].r * 1.1,
			maxR: TIERS[tier].r * 3.5,
			alpha: 1,
			rgb: TIERS[tier].rgb
		});

		// Pop particles
		spawnPopParticles(mx, my, TIERS[tier].rgb);
		playSound('bgSound');

		// Screen shake
		shakePow = Math.min(6 + tier * 0.8, 14);
	});
}


function spawnPopParticles(x, y, rgb) {
	//stelline che ruotano
	for (let i = 0; i < 10; i++) {
		const angle = Math.random() * Math.PI * 2;
		const speed = Math.random() * 3 + 5;
		popParticles.push({
			type: 'star',
			x: x,
			y: y,
			vx: Math.cos(angle) * speed,
			vy: Math.sin(angle) * speed - 3,
			rgb: {
				r: 255,
				g: 255,
				b: 200
			},
			alpha: 1,
			size: 3 + Math.random() * 2,
			rotation: Math.random() * Math.PI,
			rotSpeed: (Math.random() - 0.5) * 0.3
		});
	}

	//anello
	for (let i = 0; i < 12; i++) {
		const angle = (i / 12) * Math.PI * 2;
		const speed = 2 + Math.random() * 3 + 5;
		popParticles.push({
			type: 'ring',
			x: x,
			y: y,
			vx: Math.cos(angle) * speed,
			vy: Math.sin(angle) * speed,
			rgb: rgb,
			alpha: 1,
			size: 3 + Math.random() * 3
		});
	}
}




// ─── Drop
function drop() {
	if (!canDrop || gameOver) return;
	if (curIsBomb) {
		const x = Math.max(20, Math.min(W - 20, cursorX));
		const b = Bodies.circle(x, DROP_Y, 18, {
			restitution: 0.4,
			friction: 0.6,
			density: 0.003,
			label: 'bomb',
			angle: dropAngle,
			isBomb: true
		});
		Body.setVelocity(b, {
			x: 0,
			y: 4
		});
		World.add(world, b);
		bombs.push(b);
	} else {
		const x = clampX(curTier);
		const b = spawnBall(x, DROP_Y, curTier);
		Body.setVelocity(b, {
			x: 0,
			y: 4
		});
	}
	curTier = nxtTier;
	curIsBomb = nxtIsBomb;
	nxtTier = rndTier();
	nxtIsBomb = rndIsBomb();
	drawNext();
	canDrop = false;
	cooldownTimer = DROP_COOLDOWN;
	dropAngle = Math.random() * 2 - 1;
	playSound('bgDrop');
}

//randomizza -> mi serve per debug
function doRandomize() {
	for (let i = 0; i < 5; i++) {
		const ct = (Math.random() * 8) | 0;
		const x = clampX(ct);
		cursorX = 50 + Math.random() * (W - 50);
		const b = spawnBall(x, DROP_Y, ct);
		Body.setVelocity(b, {
			x: 0,
			y: 4
		});
	}
}

//crea bombetta
function doBomb() {
	curIsBomb = true;
}


// ─── Events
function evX(e) {
	const rect = canvas.getBoundingClientRect();
	const sx = W / rect.width;
	return ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) * sx;
}

//cheat!!!
document.addEventListener('keydown', e => {
	const i = parseInt(e.key);
	if (i >= 0 && i < TIERS.length) {
		curTier = i;
		curIsBomb = false;
	}
	if (e.key === 'b' || e.key === 'B') doBomb();
	if (e.key === 'r' || e.key === 'R') doRandomize();
});

canvas.addEventListener('mousemove', e => {
	cursorX = evX(e);
});
canvas.addEventListener('click', e => {
	if (gameOver) {
		resetGame();
		return;
	}
	cursorX = evX(e);
	drop();
	if (!musicStarted) startMusic();
});
canvas.addEventListener('touchmove', e => {
	e.preventDefault();
	cursorX = evX(e);
}, {
	passive: false
});
canvas.addEventListener('touchend', e => {
	e.preventDefault();
	if (gameOver) {
		resetGame();
		return;
	}
	drop();
}, {
	passive: false
});

// ─── Game Over Check
function checkGameOver(dt) {
	const danger = balls.some(b => {
		if (b.merging) return false;
		const spd = Math.hypot(b.velocity.x, b.velocity.y);
		return (b.position.y - TIERS[b.gameTier].r) < DANGER_Y && spd < 4;
	});
	if (danger) {
		dangerTimer += dt;
		if (dangerTimer >= 5000) {
			gameOver = true;
			if (score > best) {
				best = score;
				localStorage.setItem('mf_best', best);
			}
		}
	} else {
		dangerTimer = 0;
	}
}

// ─── Reset
function resetGame() {
	balls.forEach(b => World.remove(world, b));
	balls = [];
	mergeQueue = [];
	mergeEffects = [];
	popParticles = [];
	score = 0;
	scoreEl.textContent = 0;
	bestEl.textContent = best;
	gameOver = false;
	canDrop = true;
	cooldownTimer = 0;
	dangerTimer = 0;
	shakePow = 0;
	curIsBomb = false;
	nxtIsBomb = rndIsBomb();
	curTier = rndTier();
	nxtTier = rndTier();
	drawNext();
}

// ─── Fruit Drawing
function hilight(c, r) {
	c.beginPath();
	c.ellipse(-r * 0.3, -r * 0.4, r * 0.2, r * 0.1, -0.5, 0, Math.PI * 2);
	c.fillStyle = 'rgba(255,255,255,0.15)';
	c.fill();
}

function drawCherry(c, r) {
	// stems
	c.strokeStyle = '#5C3317';
	c.lineWidth = r * 0.12;
	c.lineCap = 'round';
	c.beginPath();
	c.moveTo(-r * 0.18, -r * 0.3);
	c.quadraticCurveTo(-r * 0.45, -r * 1.05, -r * 0.22, -r * 1.18);
	c.stroke();
	c.beginPath();
	c.moveTo(r * 0.18, -r * 0.3);
	c.quadraticCurveTo(r * 0.1, -r * 0.9, -r * 0.22, -r * 1.18);
	c.stroke();
	// leaf
	c.beginPath();
	c.moveTo(-r * 0.22, -r * 1.0);
	c.quadraticCurveTo(r * 0.18, -r * 1.28, r * 0.12, -r * 0.82);
	c.quadraticCurveTo(-r * 0.08, -r * 0.88, -r * 0.22, -r * 1.0);
	c.fillStyle = '#3a8a44';
	c.fill();
	// two cherries
	[-1, 1].forEach(side => {
		const cx = side * r * 0.36,
			cy = r * 0.05;
		const g = c.createRadialGradient(cx - r * 0.12, cy - r * 0.12, r * 0.04, cx, cy, r * 0.52);
		g.addColorStop(0, '#ff9999');
		g.addColorStop(0.5, '#dd4444');
		g.addColorStop(1, '#770000');
		c.beginPath();
		c.arc(cx, cy, r * 0.52, 0, Math.PI * 2);
		c.fillStyle = g;
		c.fill();
		c.strokeStyle = 'rgba(0,0,0,0.1)';
		c.lineWidth = 0.8;
		c.stroke();
		c.beginPath();
		c.ellipse(cx - r * 0.14, cy - r * 0.14, r * 0.12, r * 0.07, -0.5, 0, Math.PI * 2);
		c.fillStyle = 'rgba(255,255,255,0.42)';
		c.fill();
	});
}

function drawStrawberry(c, r) {
	c.save();
	c.beginPath();
	c.moveTo(0, r * 0.88);
	c.bezierCurveTo(-r * 0.82, r * 0.42, -r * 0.92, -r * 0.28, -r * 0.56, -r * 0.64);
	c.bezierCurveTo(-r * 0.26, -r * 0.94, 0, -r * 0.74, 0, -r * 0.54);
	c.bezierCurveTo(0, -r * 0.74, r * 0.26, -r * 0.94, r * 0.56, -r * 0.64);
	c.bezierCurveTo(r * 0.92, -r * 0.28, r * 0.82, r * 0.42, 0, r * 0.88);
	const g = c.createRadialGradient(-r * 0.2, -r * 0.15, r * 0.08, 0, 0.1 * r, r * 0.95);
	g.addColorStop(0, '#ff9999');
	g.addColorStop(0.5, '#ee4444');
	g.addColorStop(1, '#992222');
	c.fillStyle = g;
	c.fill();
	c.clip();
	// seeds
	c.fillStyle = 'rgba(255,225,60,0.66)';
	[
		[-0.32, 0.08],
		[0, 0.28],
		[0.32, 0.08],
		[-0.46, -0.22],
		[-0.16, -0.38],
		[0.16, -0.38],
		[0.46, -0.22],
		[-0.2, 0.52],
		[0.2, 0.52]
	].forEach(([sx, sy]) => {
		c.beginPath();
		c.ellipse(sx * r, sy * r, r * 0.055, r * 0.09, 0.3, 0, Math.PI * 2);
		c.fill();
	});
	c.restore();
	// cap leaves
	c.fillStyle = '#2d8a4e';
	[
		[-r * 0.56, -r * 0.62, -r * 0.36, -r * 0.98, 0, -r * 0.72],
		[0, -r * 0.72, r * 0.36, -r * 0.98, r * 0.56, -r * 0.62],
		[-r * 0.18, -r * 0.68, -r * 0.04, -r * 1.06, r * 0.1, -r * 0.68]
	].forEach(([x1, y1, x2, y2, x3, y3]) => {
		c.beginPath();
		c.moveTo(x1, y1);
		c.quadraticCurveTo(x2, y2, x3, y3);

function drawCoconut(c, r) {
	// Dark fibrous sphere
	const cg = c.createRadialGradient(-r * 0.3, -r * 0.3, 1, 0, 0, r);
	cg.addColorStop(0, '#887766');
	cg.addColorStop(0.1, '#664433');
	cg.addColorStop(1, '#221100');
	c.beginPath();
	c.arc(0, 0, r, 0, Math.PI * 2);
	c.fillStyle = cg;
	c.fill();

	// Fiber lines
	c.strokeStyle = 'rgba(0,0,0,0.1)';
	c.lineWidth = 1.2;
	let numb = 20;
	let cx = 0.15 * r;
	let cy = 0.15 * r;
	for (let i = 0; i < numb; i++) {
		const fa = (i / numb) * Math.PI * 2;
		c.beginPath();
		c.moveTo(cx, cy);
		c.lineTo(Math.cos(fa) * r, Math.sin(fa) * r);
		c.stroke();
	}
	//puntiricchiato
	// distribuzione uniforme con angolo aureo (phyllotaxis)
	const goldenAngle = Math.PI * (3 - Math.sqrt(5)); // ≈ 2.3999 rad
	c.fillStyle = 'rgba(0,0,0,0.1)';
	for (let i = 0; i < 50; i++) {
		const a = i * goldenAngle;
		const dr = r * 0.95 * Math.sqrt(i / 50); // raggio proporzionale a sqrt(i/N)
		c.beginPath();
		c.arc(Math.cos(a) * dr, Math.sin(a) * dr * 0.9, r * 0.02, 0, Math.PI * 2);
		c.fill();
	}

	// Three "eyes"
	c.fillStyle = '#110000';
	const eyePos = [
		[-r * 0.1, -r * 0.1],
		[r * 0.15, r * 0.15],
		[r * 0.2, -r * 0.2]
	];
	eyePos.forEach(([ex, ey]) => {
		c.beginPath();
		c.arc(ex, ey, r * 0.1, 0, Math.PI * 2);
		c.fill();
	});
	//bordo
	c.beginPath();
	c.arc(0, 0, r, 0, Math.PI * 2);
	c.strokeStyle = 'rgba(0,0,0,0.1)';
	c.lineWidth = 1;
	c.stroke();
	hilight(c, r * 0.88);
}

function drawMelon(c, r) {

	g.addColorStop(0, '#ffee99');

	g.addColorStop(0.48, '#bb9944');
	g.addColorStop(0.78, '#887722');
	g.addColorStop(1, '#665511');
	c.beginPath();
	c.arc(0, 0, r * 0.94, 0, Math.PI * 2);

	c.fill();

	c.save();

	c.beginPath();
	c.arc(0, 0, r * 0.94, 0, Math.PI * 2);
	c.clip();

	// Solchi longitudinali: coste e valli alternati pole-to-pole
	const N = 10;
	const px = 0.21;
	const tirantey = 0.50;
	const tirantex = 1.30;
	for (let i = 0; i < N; i++) {
		const k = -1 + 2 * (i / (N - 1));
		const kEdge = k * 0.94;
		c.beginPath();
		c.moveTo(kEdge * r * px, -r * 0.92);
		c.bezierCurveTo(kEdge * r * tirantex, -r * tirantey, kEdge * r * tirantex, r * tirantey, kEdge * r * px, r * 0.92);
		c.strokeStyle = (i % 2 === 0) ? 'rgba(90,65,5,0.22)' : 'rgba(240,210,120,0.18)';
		c.lineWidth = r * 0.1;
		c.stroke();
	}

	c.beginPath();
	c.arc(0, 0, r * 0.94, 0, Math.PI * 2);
	c.strokeStyle = 'rgba(60,38,4,0.28)';
	c.lineWidth = r * 0.018;

	// Picciolo

	c.lineWidth = r * 0.058;
	c.lineCap = 'round';
	c.beginPath();
	c.moveTo(0, -r * 0.92);

	c.stroke();

}

//nel loop si usa solo drawImage: zero shadow runtime, zero path/gradient per frame
function buildSprites() {
	const SPRITE_PAD = 0.35; //padding extra attorno al raggio per stemma/foglie/shadow
	const EXTRA_PAD = 14; //14px extra per shadowBlur

	TIERS.forEach(t => {
		// Dimensione sprite: raggio * 2 + padding per foglie/piccioli + margine per glow
		const pad = Math.ceil(t.r * SPRITE_PAD) + EXTRA_PAD;
		const size = Math.ceil((t.r + pad) * 2);
		const oc = document.createElement('canvas');
		oc.width = size * DPR;
		oc.height = size * DPR;
		const oc2 = oc.getContext('2d');
		const cx = size / 2;
		const cy = size / 2;

		// Bake shadow/glow dentro lo sprite — mai più chiamato nel loop!
		oc2.shadowColor = t.color;
		oc2.shadowBlur = Math.min(t.r * 0.5, 10);

		oc2.save();
		oc2.translate(cx, cy);
		t.drawFn(oc2, t.r);
		oc2.restore();

		t.sprite = oc;
		t.spriteHalf = cx; // offset per centrare con drawImage
	});
}

	if (angle) c.rotate(angle);
	const half = t.spriteHalf;
	c.drawImage(t.sprite, -half, -half);
	c.restore();
}


function drawNext() {
	nctx.clearRect(0, 0, 50, 50);
	if (nxtIsBomb) {
		drawBomb(nctx, 25, 25, 14, 0);
		document.getElementById('next-label').innerHTML = 'BOMB';
	} else {
		const t = TIERS[nxtTier];
		const sc = Math.min(20 / t.r, 1);
		nctx.save();
		nctx.translate(25, 25);
		nctx.scale(sc, sc);
		drawFruit(nctx, 0, 0, nxtTier, 1, 0);
		nctx.restore();
		document.getElementById('next-label').innerHTML = t.name;
	}
}




let SKY_COLORS = [{
		skyDark: '#0022aa',
		skyLight: '#99bbff'
	}, //blue
	{
		skyDark: '#aa0000',
		skyLight: '#000000',
	}, //red
	{
		skyDark: '#cc2255',
		skyLight: '#550033',
		skyLightx: '#ffeeff'
	}, //pink
	{
		skyDark: '#117700',
		skyLight: '#aaaa44',
		skyLightx: '#ffffdd'
	}, //green
];
let currentSkyColor = Math.floor(Math.random() * SKY_COLORS.length);

const bgCache = {};

function getBackgroundGradient(c, sky) {
	const key = sky.skyDark + "_" + sky.skyLight;

	if (bgCache[key]) return bgCache[key];

	const g = c.createLinearGradient(0, 0, 0, H);
	g.addColorStop(0, sky.skyDark);
	g.addColorStop(1, sky.skyLight);

	bgCache[key] = g;
	return g;
}

//puzzle bobble aveva la scacchiera!!!
let checkerPattern;

function createCheckerPattern(c, sky) {
	const size = 25;
	const canvas = document.createElement('canvas');
	canvas.width = size * 2;
	canvas.height = size * 2;
	const ctx = canvas.getContext('2d');
	ctx.fillStyle = sky.skyDark + '11';
	ctx.fillRect(0, 0, size * 2, size * 2);
	ctx.fillStyle = sky.skyLight + '11';
	ctx.fillRect(0, 0, size, size);
	ctx.fillRect(size, size, size, size);

	return c.createPattern(canvas, 'repeat');
}

//cambia anche il bg del body
const sky = SKY_COLORS[currentSkyColor];
document.body.style.backgroundImage = `linear-gradient(180deg, ${sky.skyDark}, ${sky.skyLight})`;

checkerPattern = createCheckerPattern(ctx, sky); //

function pickSkyColor() {
	currentSkyColor = new Date().getSeconds() % SKY_COLORS.length;
	//cambia anche il bg del body
	const sky = SKY_COLORS[currentSkyColor];
	document.body.style.backgroundImage = `linear-gradient(180deg, ${sky.skyDark}, ${sky.skyLight})`;

	checkerPattern = createCheckerPattern(ctx, sky); //
}




// ─── Main Draw
function draw() {
	const now = Date.now();

	// Screen shake
	shakeX = shakePow > 0.2 ? (Math.random() - 0.5) * shakePow : 0;
	shakeY = shakePow > 0.2 ? (Math.random() - 0.5) * shakePow : 0;
	shakePow *= 0.82;

	ctx.save();
	ctx.translate(shakeX, shakeY);

	// BG gradient
	ctx.fillStyle = getBackgroundGradient(ctx, SKY_COLORS[currentSkyColor]);
	ctx.fillRect(0, 0, W, H);
	ctx.fillStyle = checkerPattern;
	ctx.fillRect(0, 0, W, H);

	// Drop guide
	if (!gameOver && canDrop) {
		if (curIsBomb) {
			//bombetta
			const cx = Math.max(20, Math.min(W - 20, cursorX));
			ctx.strokeStyle = '#00000055';
			ctx.lineWidth = 6;
			ctx.setLineDash([12, 12]);
			ctx.beginPath();
			ctx.moveTo(cx, DROP_Y + 22);
			ctx.lineTo(cx, H);
			ctx.stroke();
			ctx.setLineDash([]);
			drawBomb(ctx, cx, DROP_Y, 18, dropAngle);
		} else {
			//frutto
			const cx = clampX(curTier);
			ctx.strokeStyle = TIERS[curTier].color + '55';
			ctx.lineWidth = 6;
			ctx.setLineDash([12, 12]);
			ctx.beginPath();
			ctx.moveTo(cx, DROP_Y + TIERS[curTier].r + 4);
			ctx.lineTo(cx, H);
			ctx.stroke();
			ctx.setLineDash([]);
			drawFruit(ctx, cx, DROP_Y, curTier, 0.9, dropAngle);
		}
	}

	// Merge ring effects
	mergeEffects = mergeEffects.filter(e => e.alpha > 0.01);
	mergeEffects.forEach(e => {
		//const { r: er, g: eg, b: eb } = hexRgb(e.color);
		const {
			r,
			g,
			b
		} = e.rgb; //precalcolato
		ctx.beginPath();
		ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
		//ctx.strokeStyle = `rgba(${er},${eg},${eb},${e.alpha})`;
		ctx.strokeStyle = `rgba(${r},${g},${b},${e.alpha})`; //precalcolato
		ctx.lineWidth = 4;
		ctx.stroke();
		e.r = e.r + (e.maxR - e.r) * 0.18;
		e.alpha *= 0.84;
	});

	// Pop particles
	popParticles = popParticles.filter(p => p.alpha > 0.01);
	popParticles.forEach(p => drawParticle(ctx, p));

	// Balls
	balls.forEach(b => {
		if (!b.merging) drawFruit(ctx, b.position.x, b.position.y, b.gameTier, 1, b.angle);
	});

	//bombette
	bombs.forEach(b => {
		drawBomb(ctx, b.position.x, b.position.y, 18, b.angle);
	});

	//pareti + fondo
	drawBarattolo(now);

	// ── Game Over Overlay
	if (gameOver) {
		drawEndGame('GAME OVER', '#FF6B6B', now);
	}

	ctx.restore();
}

//particelle spettacolari
function drawParticle(ctx, p) {
	const { r, g, b } = p.rgb;
	const s = p.size;
	const alpha = p.alpha;
	
	if (p.type === 'star') {
		// Stellina a 4 punte che ruota
		ctx.save();
		ctx.translate(p.x, p.y);
		ctx.rotate(p.rotation);	
		ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
		ctx.beginPath();
		ctx.moveTo(0, -s * 2.5);
		ctx.lineTo(s * 0.5, -s * 0.5);
		ctx.lineTo(s * 2.5, 0);
		ctx.lineTo(s * 0.5, s * 0.5);
		ctx.lineTo(0, s * 2.5);
		ctx.lineTo(-s * 0.5, s * 0.5);
		ctx.lineTo(-s * 2.5, 0);
		ctx.lineTo(-s * 0.5, -s * 0.5);
		ctx.closePath();
		ctx.fill();
		ctx.restore();

		p.x += p.vx;
		p.y += p.vy;
		p.vx *= 0.98;
		p.vy *= 0.98;
		p.vy += 0.20;
		p.alpha *= 0.98;
		p.rotation += p.rotSpeed;
	} else {
		//anello
		ctx.beginPath();
		ctx.arc(p.x, p.y, s * alpha, 0, Math.PI * 2);
		ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
		ctx.fill();
		p.x += p.vx;
		p.y += p.vy;
		p.vy += 0.18;
		p.alpha *= 0.88;
	}
}

//barattolo di vetro
function drawBarattolo(now) {
	// Danger zone tint when in danger
	if (dangerTimer > 0) {
		const p = Math.min(dangerTimer / 2200, 1);
		ctx.fillStyle = `rgba(255,40,40,${p * 0.08})`;
		ctx.fillRect(0, 0, W, DANGER_Y);
	}

	// Danger line
	const blink = dangerTimer > 0 ? 0.3 + 0.5 * Math.abs(Math.sin(now / 180)) : 0.5;
	ctx.strokeStyle = `rgba(255,255,255,${blink})`;
	ctx.lineWidth = 3;
	ctx.setLineDash([15, 15]);
	ctx.beginPath();
	ctx.moveTo(0, DANGER_Y);
	ctx.lineTo(W, DANGER_Y);
	ctx.stroke();
	//barattolo con tappo tondo
	//ctx.setLineDash([8, 4]);
	//ctx.beginPath(); ctx.ellipse(W / 2, DANGER_Y, W / 2 + 4, 8, 0, 0, Math.PI * 2); ctx.stroke();
	ctx.setLineDash([]);

	//parete sx
	const lg = ctx.createLinearGradient(0, 0, 10, 0);
	lg.addColorStop(0, 'rgba(255,255,255,0.8)');
	lg.addColorStop(1, 'rgba(255,255,255,0)');
	ctx.fillStyle = lg;
	ctx.fillRect(0, DANGER_Y, 8, H - DANGER_Y);

	//parete dx
	const rg = ctx.createLinearGradient(W, 0, W - 10, 0);
	rg.addColorStop(0, 'rgba(255,255,255,0.8)');
	rg.addColorStop(1, 'rgba(255,255,255,0)');
	ctx.fillStyle = rg;
	ctx.fillRect(W - 8, DANGER_Y, 8, H - DANGER_Y);

	//fondo
	const fg = ctx.createLinearGradient(0, H - 8, 0, H);
	fg.addColorStop(0, 'rgba(255,255,255,0)');
	fg.addColorStop(1, 'rgba(255,255,255,0.8)');
	ctx.fillStyle = fg;
	ctx.fillRect(0, H - 8, W, 8);
}

//scritta fine gioco
function drawEndGame(testo, colore, now) {
	ctx.fillStyle = 'rgba(5,5,20,.82)';
	ctx.fillRect(0, 0, W, H);
	ctx.textAlign = 'center';
	ctx.shadowColor = colore;
	ctx.shadowBlur = 32;
	ctx.font = 'bold 52px Impact,Arial Black,sans-serif';
	ctx.fillStyle = colore;
	ctx.fillText(testo, W / 2, H / 2 - 52);
	ctx.shadowBlur = 0;
	ctx.font = 'bold 26px Trebuchet MS';
	ctx.fillStyle = '#fff';
	ctx.fillText(`POINTS: ${score}`, W / 2, H / 2 + 2);
	ctx.font = '18px Trebuchet MS';
	ctx.fillStyle = 'rgba(255,255,255,.52)';
	ctx.fillText(`BEST: ${best}`, W / 2, H / 2 + 36);
	if (Math.sin(now / 500) > 0) {
		ctx.font = 'bold 16px Trebuchet MS';
		ctx.fillStyle = 'rgba(255,255,255,.8)';
		ctx.fillText('— CLICK TO RESTART —', W / 2, H / 2 + 82);
	}
}



// ─── Responsive
function rescale() {
	const wiw = window.innerWidth;
	const wih = window.innerHeight;
	const ratio = W / H;

	const maxW = wiw - 16;
	const maxH = wih - 130;

	let newW;
	let newH;

	if (maxW / ratio > maxH) {
		newH = maxH;
		newW = newH * ratio;
	} else {
		newW = maxW;
		newH = newW / ratio;
	}

	canvas.style.width = `${newW}px`;
	canvas.style.height = `${newH}px`;

	document.getElementById('header').style.width = `${newW}px`;
	document.getElementById('footer').style.width = `${newW}px`;
	//document.getElementById('legend').style.width = `${newW}px`;
}
rescale();
window.addEventListener('resize', rescale);

// ─── Loop
let lastT = 0;

function loop(t) {
	const dt = Math.min(t - lastT, 60);
	lastT = t;

	if (!gameOver) {
		processMerges();
		Engine.update(engine, 1000 / 60);
		checkGameOver(dt);
		if (!canDrop) {
			cooldownTimer -= dt;
			if (cooldownTimer <= 0) canDrop = true;
		}
	}

	draw();
	requestAnimationFrame(loop);
}

//esplodi la bombetta
function explodeBomb(bomb) {
	const radius = 120;
	World.remove(world, bomb); // rimuovi bomb
	bombs = bombs.filter(x => x !== bomb);
	// distruggi frutti vicini
	balls.forEach(ball => {
		const dx = ball.position.x - bomb.position.x;
		const dy = ball.position.y - bomb.position.y;
		const dist = Math.sqrt(dx * dx + dy * dy);
		if (dist < radius) {
			spawnPopParticles(ball.position.x, ball.position.y, {
				r: 255,
				g: 0,
				b: 0
			});
			World.remove(world, ball);
		}
	});
	balls = balls.filter(ball => {
		const dx = ball.position.x - bomb.position.x;
		const dy = ball.position.y - bomb.position.y;
		return Math.sqrt(dx * dx + dy * dy) >= radius;
	});
	//effetto visivo bomba esplosa
	spawnPopParticles(bomb.position.x, bomb.position.y, {
		r: 255,
		g: 0,
		b: 0
	});
	playSound('bgSound');
	shakePow = 24;
}

//disegna la bombetta
function drawBomb(c, x, y, r, angle) {
	c.save();
	c.translate(x, y);
	c.rotate(angle);

	// corpo
	const g = c.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.05, 0, 0, r);
	g.addColorStop(0, '#666');
	g.addColorStop(1, '#111');
	c.beginPath();
	c.arc(0, 0, r, 0, Math.PI * 2);
	c.fillStyle = g;
	c.fill();
	c.strokeStyle = 'rgba(0,0,0,0.4)';
	c.lineWidth = 1;
	c.stroke();

	// riflesso
	//c.beginPath(); c.ellipse(-r*0.28, -r*0.28, r*0.18, r*0.10, -0.5, 0, Math.PI*2);
	c.beginPath();
	c.ellipse(-r * 0.5, -r * 0.2, r * 0.25, r * 0.12, -0.8, 0, Math.PI * 2);
	c.fillStyle = 'rgba(255,255,255,0.22)';
	c.fill();

	// miccia curva
	c.strokeStyle = '#885500';
	c.lineWidth = r * 0.13;
	c.lineCap = 'round';
	//c.beginPath(); c.moveTo(r*0.5, -r*0.7); c.quadraticCurveTo(r*0.9, -r*1.1, r*0.5, -r*1.5);
	c.beginPath();
	c.moveTo(r * 0.3, -r * 0.6);
	c.quadraticCurveTo(r * 1.2, -r * 1.4, r * 0.4, -r * 1.8);
	c.stroke();

	// scintilla
	c.fillStyle = '#ffaa00';
	c.shadowColor = '#ff8800';
	c.shadowBlur = 6;
	c.beginPath();
	c.arc(r * 0.5, -r * 1.5, r * 0.18, 0, Math.PI * 2);
	c.fill();
	c.shadowBlur = 0;
	c.restore();
}

//trucco terremoto
function doEarthquake() {
	let shakes = 3;

	const interval = setInterval(() => {
		shakePow = 20; //solo visivo
		balls.forEach(b => {
			const m = b.mass; //massa del corpo
			Body.applyForce(b, b.position, {
				x: (Math.random() - 0.5) * 0.02 * m,
				y: (-0.02 - Math.random() * 0.03) * m
			});
		});

		if (--shakes <= 0) clearInterval(interval);
	}, 1000);
}

// ─── Start
TIERS.forEach(t => {
	t.rgb = hexRgb(t.color);
});
buildSprites();
drawNext();
requestAnimationFrame(loop);
