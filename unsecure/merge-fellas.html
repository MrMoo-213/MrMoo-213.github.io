<!DOCTYPE html>
<html lang="it">
<head>
<link rel="icon" type="image/png" href="/images/favicon_emoji.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Merge Fellas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a18;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    font-family: 'Trebuchet MS', 'Arial Rounded MT Bold', sans-serif;
  }
  #wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 400px;
    padding: 4px 6px;
  }
  .score-box {
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.04));
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 6px 18px;
    text-align: center;
    min-width: 100px;
  }
  .score-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 2px;
  }
  .score-value {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
  }
  #nextBox {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .next-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }
  #nextCanvas {
    display: block;
  }
  #gameCanvas {
    display: block;
    border-radius: 4px;
    cursor: none;
  }
  #legend {
    display: flex;
    gap: 5px;
    align-items: center;
    justify-content: center;
    width: 400px;
    padding: 4px 0;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 12px;
    color: rgba(255,255,255,0.99945);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<div id="wrapper">
  <div id="header">
    <div class="score-box">
      <div class="score-label">POINTS</div>
      <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <div id="nextBox">
      <div class="next-label">NEXT</div>
      <canvas id="nextCanvas" width="64" height="64"></canvas>
    </div>
    <div class="score-box">
      <div class="score-label">BEST</div>
      <div class="score-value" id="bestDisplay">0</div>
    </div>
  </div>
  <canvas id="gameCanvas" width="400" height="580"></canvas>
  <div id="legend"></div>
</div>

<script>
const { Engine, Bodies, Body, World, Events } = Matter;

// ─── Config ────────────────────────────────────────────────────────────────────
const W = 400, H = 580;
const WALL_T = 50;
const DROP_Y = 38;
const DANGER_Y = 100;
const DROP_COOLDOWN = 550;
const MAX_TIER = 10;

const TIERS = [
  { r: 18,  color: '#FF6B6B', emoji: '😊', name: 'Baby',      pts: 1   },
  { r: 26,  color: '#FF9F43', emoji: '😄', name: 'Big Friend',    pts: 3   },
  { r: 35,  color: '#F9CA24', emoji: '😎', name: 'Cool Guy',   pts: 6   },
  { r: 45,  color: '#6AB04C', emoji: '🥳', name: 'Party Animal',  pts: 10  },
  { r: 56,  color: '#22A6B3', emoji: '😍', name: 'In Love', pts: 15  },
  { r: 67,  color: '#4BCFFA', emoji: '🤩', name: 'Star',       pts: 21  },
  { r: 79,  color: '#A29BFE', emoji: '👽', name: 'Alien',     pts: 28  },
  { r: 91,  color: '#FD79A8', emoji: '🐸', name: 'Frog',  pts: 36  },
  { r: 104, color: '#E17055', emoji: '🦊', name: 'Big Fox',    pts: 45  },
  { r: 118, color: '#00B894', emoji: '🐲', name: 'Dragon',      pts: 55  },
  { r: 133, color: '#FDCB6E', emoji: '👑', name: 'The King',      pts: 100 },
];

// ─── Physics ───────────────────────────────────────────────────────────────────
const engine = Engine.create({ gravity: { y: 2.8 }, positionIterations: 10, velocityIterations: 8 });
const world = engine.world;

World.add(world, [
  Bodies.rectangle(W/2, H + WALL_T/2 - 2, W + WALL_T*2, WALL_T, { isStatic: true, label:'wall', friction:0.6, restitution:0.1 }),
  Bodies.rectangle(-WALL_T/2 + 2, H/2, WALL_T, H*3, { isStatic: true, label:'wall', friction:0.4 }),
  Bodies.rectangle(W + WALL_T/2 - 2, H/2, WALL_T, H*3, { isStatic: true, label:'wall', friction:0.4 }),
]);

// ─── State ─────────────────────────────────────────────────────────────────────
let balls = [], mergeQueue = [], mergeEffects = [], popParticles = [];
let score = 0, best = parseInt(localStorage.getItem('mf_best') || '0');
let gameOver = false, canDrop = true, cooldownTimer = 0;
let cursorX = W / 2, dangerTimer = 0;
let curTier = rndTier(), nxtTier = rndTier();
let shakeX = 0, shakeY = 0, shakePow = 0;

// ─── DOM ───────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const ncanv  = document.getElementById('nextCanvas');
const nctx   = ncanv.getContext('2d');
const scoreEl = document.getElementById('scoreDisplay');
const bestEl  = document.getElementById('bestDisplay');
bestEl.textContent = best;

// Legend
const legendEl = document.getElementById('legend');
TIERS.forEach(t => {
  const d = document.createElement('div');
  d.className = 'legend-item';
  d.innerHTML = `<div class="legend-dot" style="background:${t.color}"></div><span style="color:${t.color}">${t.emoji} ${t.name}</span>`;
  legendEl.appendChild(d);
});

// ─── Helpers ───────────────────────────────────────────────────────────────────
function rndTier() {
  const w = [34, 26, 18, 12, 7, 3, 0, 0, 0, 0, 0];
  let r = Math.random() * w.reduce((a,b) => a+b, 0);
  for (let i = 0; i < w.length; i++) { r -= w[i]; if (r <= 0) return i; }
  return 0;
}

function hexRgb(h) {
  return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) };
}

function clampX(tier) {
  const r = TIERS[tier].r;
  return Math.max(r + 2, Math.min(W - r - 2, cursorX));
}

// ─── Ball Creation ─────────────────────────────────────────────────────────────
function spawnBall(x, y, tier) {
  const t = TIERS[tier];
  const b = Bodies.circle(x, y, t.r, {
    restitution: 0.22, friction: 0.55, frictionAir: 0.007,
    density: 0.0025, label: 'ball',
    collisionFilter: { category: 0x0001, mask: 0x0001 }
  });
  b.gameTier = tier;
  b.merging = false;
  World.add(world, b);
  balls.push(b);
  return b;
}

// ─── Collision ─────────────────────────────────────────────────────────────────
Events.on(engine, 'collisionStart', ev => {
  if (gameOver) return;
  ev.pairs.forEach(({ bodyA: a, bodyB: b }) => {
    if (a.label !== 'ball' || b.label !== 'ball') return;
    if (a.gameTier !== b.gameTier || a.gameTier >= MAX_TIER) return;
    if (a.merging || b.merging) return;
    a.merging = b.merging = true;
    mergeQueue.push([a, b]);
  });
});

function processMerges() {
  if (!mergeQueue.length) return;
  mergeQueue.splice(0).forEach(([a, b]) => {
    const mx = (a.position.x + b.position.x) / 2;
    const my = (a.position.y + b.position.y) / 2;
    const tier = a.gameTier + 1;
    World.remove(world, a);
    World.remove(world, b);
    balls = balls.filter(x => x !== a && x !== b);

    score += TIERS[tier].pts;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('mf_best', best); }

    const nb = spawnBall(mx, my, tier);
    Body.setVelocity(nb, { x: (Math.random()-0.5)*2, y: -5 });

    // Ring effect
    mergeEffects.push({ x: mx, y: my, r: TIERS[tier].r * 1.1, maxR: TIERS[tier].r * 3.5, alpha: 1, color: TIERS[tier].color });
    // Pop particles
    for (let i = 0; i < 12; i++) {
      const ang = (i / 12) * Math.PI * 2;
      const spd = 2 + Math.random() * 4;
      popParticles.push({ x: mx, y: my, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, r: 3 + Math.random()*3, alpha: 1, color: TIERS[tier].color });
    }
    // Screen shake
    shakePow = Math.min(6 + tier * 0.8, 14);
  });
}

// ─── Drop ──────────────────────────────────────────────────────────────────────
function drop() {
  if (!canDrop || gameOver) return;
  const x = clampX(curTier);
  const b = spawnBall(x, DROP_Y, curTier);
  Body.setVelocity(b, { x: 0, y: 4 });
  curTier = nxtTier;
  nxtTier = rndTier();
  drawNext();
  canDrop = false;
  cooldownTimer = DROP_COOLDOWN;
}

// ─── Events ────────────────────────────────────────────────────────────────────
function evX(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width;
  return ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) * sx;
}

canvas.addEventListener('mousemove', e => { cursorX = evX(e); });
canvas.addEventListener('click', e => { if (gameOver) { resetGame(); return; } cursorX = evX(e); drop(); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); cursorX = evX(e); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); if (gameOver) { resetGame(); return; } drop(); }, { passive: false });

// ─── Game Over Check ───────────────────────────────────────────────────────────
function checkGameOver(dt) {
  const danger = balls.some(b => {
    if (b.merging) return false;
    const spd = Math.hypot(b.velocity.x, b.velocity.y);
    return (b.position.y - TIERS[b.gameTier].r) < DANGER_Y && spd < 4;
  });
  if (danger) {
    dangerTimer += dt;
    if (dangerTimer >= 2200) { gameOver = true; if (score > best) { best = score; localStorage.setItem('mf_best', best); } }
  } else { dangerTimer = 0; }
}

// ─── Reset ─────────────────────────────────────────────────────────────────────
function resetGame() {
  balls.forEach(b => World.remove(world, b));
  balls = []; mergeQueue = []; mergeEffects = []; popParticles = [];
  score = 0; scoreEl.textContent = 0; bestEl.textContent = best;
  gameOver = false; canDrop = true; cooldownTimer = 0; dangerTimer = 0;
  shakePow = 0;
  curTier = rndTier(); nxtTier = rndTier();
  drawNext();
}

// ─── Drawing ───────────────────────────────────────────────────────────────────
function drawFella(c, x, y, tier, alpha) {
  if (alpha === undefined) alpha = 1;
  const t = TIERS[tier];
  const { r } = t;
  const { r: cr, g: cg, b: cb } = hexRgb(t.color);

  c.save();
  c.globalAlpha = alpha;
  c.translate(x, y);

  // Outer glow
  c.shadowColor = t.color;
  c.shadowBlur = r * 0.7;

  // Body
  const g = c.createRadialGradient(-r*0.28, -r*0.32, r*0.05, 0, 0, r);
  g.addColorStop(0, `rgb(${Math.min(cr+90,255)},${Math.min(cg+90,255)},${Math.min(cb+90,255)})`);
  g.addColorStop(0.65, t.color);
  g.addColorStop(1,   `rgb(${Math.max(cr-60,0)},${Math.max(cg-60,0)},${Math.max(cb-60,0)})`);
  c.beginPath();
  c.arc(0, 0, r, 0, Math.PI*2);
  c.fillStyle = g;
  c.fill();

  // Rim
  c.shadowBlur = 0;
  c.strokeStyle = `rgba(255,255,255,0.25)`;
  c.lineWidth = 1.5;
  c.stroke();

  // Specular highlight
  c.beginPath();
  c.ellipse(-r*0.28, -r*0.35, r*0.22, r*0.13, -0.6, 0, Math.PI*2);
  c.fillStyle = 'rgba(255,255,255,0.3)';
  c.fill();

  // Emoji
  c.font = `${Math.round(r * 1.5)}px serif`;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.shadowBlur = 0;
  c.globalAlpha = alpha;
  c.fillText(t.emoji, 0, r * 0.07);

  c.restore();
}

function drawNext() {
  nctx.clearRect(0, 0, 64, 64);
  const t = TIERS[nxtTier];
  const sc = Math.min(27 / t.r, 1);
  nctx.save();
  nctx.translate(32, 32);
  nctx.scale(sc, sc);
  drawFella(nctx, 0, 0, nxtTier, 1);
  nctx.restore();
}

// ─── Main Draw ─────────────────────────────────────────────────────────────────
function draw() {
  const now = Date.now();

  // Screen shake
  shakeX = shakePow > 0.2 ? (Math.random()-0.5) * shakePow : 0;
  shakeY = shakePow > 0.2 ? (Math.random()-0.5) * shakePow : 0;
  shakePow *= 0.82;

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // BG
  const bgG = ctx.createLinearGradient(0, 0, 0, H);
  bgG.addColorStop(0, '#111128');
  bgG.addColorStop(1, '#0d0d1e');
  ctx.fillStyle = bgG;
  ctx.fillRect(-4, -4, W+8, H+8);

  // Subtle vertical lines
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let x = 20; x < W; x += 20) {
    ctx.beginPath(); ctx.moveTo(x, DANGER_Y); ctx.lineTo(x, H); ctx.stroke();
  }

  // Danger zone tint when in danger
  if (dangerTimer > 0) {
    const p = Math.min(dangerTimer / 2200, 1);
    ctx.fillStyle = `rgba(255,40,40,${p * 0.08})`;
    ctx.fillRect(0, 0, W, DANGER_Y);
  }

  // Danger line
  const blink = dangerTimer > 0 ? 0.3 + 0.5 * Math.abs(Math.sin(now / 180)) : 0.25;
  ctx.strokeStyle = `rgba(255,90,90,${blink})`;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([7, 5]);
  ctx.beginPath(); ctx.moveTo(0, DANGER_Y); ctx.lineTo(W, DANGER_Y); ctx.stroke();
  ctx.setLineDash([]);

  // Drop guide
  if (!gameOver && canDrop) {
    const cx = clampX(curTier);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 7]);
    ctx.beginPath(); ctx.moveTo(cx, DROP_Y + TIERS[curTier].r + 4); ctx.lineTo(cx, H); ctx.stroke();
    ctx.setLineDash([]);
    drawFella(ctx, cx, DROP_Y, curTier, 0.88);
  }

  // Merge ring effects
  mergeEffects = mergeEffects.filter(e => e.alpha > 0.01);
  mergeEffects.forEach(e => {
    const { r: er, g: eg, b: eb } = hexRgb(e.color);
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${er},${eg},${eb},${e.alpha})`;
    ctx.lineWidth = 4;
    ctx.stroke();
    e.r = e.r + (e.maxR - e.r) * 0.18;
    e.alpha *= 0.84;
  });

  // Pop particles
  popParticles = popParticles.filter(p => p.alpha > 0.01);
  popParticles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.alpha, 0, Math.PI*2);
    const { r: pr, g: pg, b: pb } = hexRgb(p.color);
    ctx.fillStyle = `rgba(${pr},${pg},${pb},${p.alpha})`;
    ctx.fill();
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.18;
    p.alpha *= 0.88;
  });

  // Balls
  balls.forEach(b => {
    if (!b.merging) drawFella(ctx, b.position.x, b.position.y, b.gameTier);
  });

  // Wall glows (side edges)
  const lg = ctx.createLinearGradient(0, 0, 10, 0);
  lg.addColorStop(0, 'rgba(255,255,255,0.12)'); lg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = lg; ctx.fillRect(0, DANGER_Y, 8, H - DANGER_Y);
  const rg = ctx.createLinearGradient(W, 0, W-10, 0);
  rg.addColorStop(0, 'rgba(255,255,255,0.12)'); rg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = rg; ctx.fillRect(W-8, DANGER_Y, 8, H - DANGER_Y);
  // Floor glow
  const fg = ctx.createLinearGradient(0, H-8, 0, H);
  fg.addColorStop(0, 'rgba(255,255,255,0)'); fg.addColorStop(1, 'rgba(255,255,255,0.08)');
  ctx.fillStyle = fg; ctx.fillRect(0, H-8, W, 8);

  // ── Game Over Overlay ──────────────────────────────────────────────────────
  if (gameOver) {
    ctx.fillStyle = 'rgba(5,5,20,0.82)';
    ctx.fillRect(0, 0, W, H);

    // Title
    ctx.textAlign = 'center';
    ctx.shadowColor = '#FF6B6B';
    ctx.shadowBlur = 30;
    ctx.font = 'bold 54px Impact, Arial Black, sans-serif';
    ctx.fillStyle = '#FF6B6B';
    ctx.fillText('GAME OVER', W/2, H/2 - 65);
    ctx.shadowBlur = 0;

    // Score
    ctx.font = 'bold 28px Trebuchet MS, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(`POINTS: ${score}`, W/2, H/2 - 10);

    ctx.font = '20px Trebuchet MS, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(`BEST: ${best}`, W/2, H/2 + 28);

    // Restart hint (blinking)
    if (Math.sin(now / 500) > 0) {
      ctx.font = 'bold 17px Trebuchet MS, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.fillText('— CLICK TO RESTART —', W/2, H/2 + 82);
    }
  }

  ctx.restore();
}

// ─── Responsive Scaling ────────────────────────────────────────────────────────
function rescale() {
  const maxW = Math.min(window.innerWidth - 16, 400);
  const sc = maxW / 400;
  canvas.style.width  = `${maxW}px`;
  canvas.style.height = `${580 * sc}px`;
  document.getElementById('header').style.width = `${maxW}px`;
  document.getElementById('legend').style.width = `${maxW}px`;
}
rescale();
window.addEventListener('resize', rescale);

// ─── Loop ──────────────────────────────────────────────────────────────────────
let lastT = 0;
function loop(t) {
  const dt = Math.min(t - lastT, 60);
  lastT = t;

  if (!gameOver) {
    processMerges();
    Engine.update(engine, 1000/60);
    checkGameOver(dt);
    if (!canDrop) { cooldownTimer -= dt; if (cooldownTimer <= 0) canDrop = true; }
  }

  draw();
  requestAnimationFrame(loop);
}

// ─── Start ─────────────────────────────────────────────────────────────────────
drawNext();
requestAnimationFrame(loop);
</script>
</body>
</html>
