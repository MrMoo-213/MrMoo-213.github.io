<!DOCTYPE html>
<html>
<head>
  <title>Register Your Domain</title>

  <link rel="stylesheet" href="/home/buttonStyle.css">

  <style>
    html, body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      color: white;
      text-align: center;
      background-color: #0f0f1e;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    input {
      width: 320px;
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
    }

    button {
      padding: 12px 30px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    #msg {
      margin-top: 20px;
      font-size: 1.2rem;
    }
  </style>
</head>

<body>

<h1>Register Your Domain</h1>

<input id="domain" placeholder="@example.com">
<input id="user" placeholder="User">

<button onclick="submitRequest()">Request Registration</button>

<p id="msg"></p>

<script>
const WEBHOOK = "https://script.google.com/macros/s/AKfycbx7BEoyN1z4-FUrVXEgWkLrScMO7aXk3xQ0JOfIHqdzCfgc_TvIy0vN8qhtISxp7BEp/exec";

function validDomain(d) {
  return d.includes("@") && d.includes(".") && d.indexOf("@") > 0;
}

function submitRequest() {

  const domainInput = document.getElementById("domain");
  const userInput = document.getElementById("user");

  const domain = domainInput.value.trim();
  const user = userInput.value.trim();

  if (!domain || !user) return msg("Fill all fields");

  if (!validDomain(domain)) return msg("Invalid domain");

  // check duplicate first
  fetch(WEBHOOK + "?t=" + Date.now())
    .then(r => r.json())
    .then(data => {

      const exists = data.some(r =>
        String(r.domain).trim().toLowerCase() === domain.toLowerCase()
      );

      if (exists) {
        msg("Already registered");
        return;
      }

      // submit
      fetch(WEBHOOK, {
        method: "POST",
        body: JSON.stringify({ domain, user })
      })
      .then(() => {
        msg("Submitted");

        // clear fields
        domainInput.value = "";
        userInput.value = "";
      });

    });
}

function msg(t) {
  document.getElementById("msg").innerText = t;
}
</script>

</body>
</html>
