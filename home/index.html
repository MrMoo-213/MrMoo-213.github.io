<script>
  const loginTime = localStorage.getItem("login_time");
  const loginOk = localStorage.getItem("login_ok");
  if (!loginOk || !loginTime) window.location.href = "/index.html";
  if (Date.now() - parseInt(loginTime) > 3600000) {
    localStorage.removeItem("login_ok");
    localStorage.removeItem("login_time");
    window.location.href = "/index.html";
  }
</script>

  <script>
    const REVIEWS_URL = "https://script.google.com/macros/s/AKfycbzWUckXPqhYJjekdEeBCe2jRppR6QChfV-Tqb57ubg1Z5tCHOfFoNsDD9nthRDqS3c_/exec";
    const REPORTS_URL = "https://script.google.com/macros/s/AKfycbyducsNYnfrQluBl12TVuj_JYIX5vlSrpglepkja1NbGnzmiEc1t3RsZKUH0hilMw9CWQ/exec";

    let currentGame = "";
    let currentRating = 5;

    function redirect(url) { window.location.href = url; }

    // Load averages
    fetch(REVIEWS_URL)
      .then(r => r.json())
      .then(data => {
        data.forEach(entry => {
          if (entry.average !== null) {
            const avg = parseFloat(entry.average).toFixed(1);
            document.querySelectorAll(`.rating-pill[data-game="${entry.game}"]`)
              .forEach(btn => btn.textContent = avg + " ⭐");
          }
        });
      })
      .catch(() => {});

    function openModal(game) {
      currentGame = game;
      currentRating = 5;
      document.getElementById("modal-title").textContent = game;
      updateModal();
      document.getElementById("overlay").classList.add("active");
      document.getElementById("rate-modal").classList.add("active");
    }

    function closeAll() {
      document.getElementById("overlay").classList.remove("active");
      document.getElementById("rate-modal").classList.remove("active");
    }

    function changeRating(dir) {
      currentRating = Math.min(5, Math.max(1, currentRating + dir));
      updateModal();
    }

    function updateModal() {
      document.getElementById("spinner-val").textContent = currentRating;
      document.getElementById("stars-row").textContent = "⭐".repeat(currentRating);
      document.getElementById("modal-badge").textContent = currentRating + " ⭐";
    }

    function submitRating() {
      fetch(REVIEWS_URL, {
        method: "POST",
        body: JSON.stringify({ game: currentGame, rating: currentRating })
      }).catch(() => {});
      closeAll();
    }

    function submitReportFromModal() {
      fetch(REPORTS_URL, {
        method: "POST",
        body: JSON.stringify({ game: currentGame })
      }).catch(() => {});
      closeAll();
    }

    function quickReport(game) {
      fetch(REPORTS_URL, {
        method: "POST",
        body: JSON.stringify({ game: game })
      }).catch(() => {});
    }
  </script>
